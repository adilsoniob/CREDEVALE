<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#020617" />
    <title>CredVale — Seu Acesso Está Pronto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function(){var h=window.location.hostname;var p=window.location.port;var rail='https://valle-production-105b.up.railway.app/api';if(h.includes('edgeone.run')){window.__API_BASE=sessionStorage.getItem('vs_api_url')||rail}else if(h==='localhost'||h==='127.0.0.1'){if(p==='3000'||!p){window.__API_BASE=window.location.origin+'/api'}else{window.__API_BASE=rail;try{sessionStorage.setItem('vs_api_url',rail)}catch(e){}}}else{window.__API_BASE='/api'}})();
    </script>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%}
      body{
        font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
        background:#020617;
        color:#e2e8f0;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        overflow-x:hidden
      }
      .page-wrap{
        max-width:420px;
        margin:0 auto;
        padding:24px 20px 40px;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        gap:22px
      }

      /* Logo */
      .logo-wrap{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        padding-top:2px
      }
      .logo-icon{
        width:38px;height:38px;
        border-radius:10px;
        background:linear-gradient(135deg,#3b82f6,#10b981);
        display:flex;align-items:center;justify-content:center;
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:17px;color:#fff;
        box-shadow:0 4px 16px rgba(59,130,246,0.15)
      }
      .logo-text{
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:20px;line-height:1
      }
      .logo-text span:first-child{color:#fff}
      .logo-text span:last-child{color:#10b981}

      /* Headline */
      .headline-wrap{text-align:center}
      .headline-emoji{font-size:2rem;display:block;margin-bottom:6px}
      .headline-title{
        font-family:'Space Grotesk',sans-serif;
        font-size:1.65rem;font-weight:800;line-height:1.2;
        color:#e2e8f0
      }
      .headline-title em{
        font-style:normal;
        background:linear-gradient(135deg,#10b981,#34d399);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text
      }

      /* Copy */
      .copy-text{
        font-size:0.82rem;line-height:1.65;
        color:#94a3b8;text-align:center;
        max-width:360px;margin:0 auto
      }

      /* Card virtual */
      .virtual-card{
        width:100%;
        border-radius:16px;
        background:linear-gradient(145deg,rgba(30,41,59,0.85),rgba(15,23,42,0.9));
        border:1px solid rgba(255,255,255,0.06);
        box-shadow:0 12px 40px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.03) inset;
        padding:18px 20px;
        display:flex;
        flex-direction:column;
        gap:14px;
        position:relative;
        overflow:hidden;
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px)
      }
      .virtual-card::before{
        content:'';
        position:absolute;
        top:-50%;right:-25%;
        width:260px;height:260px;
        background:radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 60%);
        pointer-events:none
      }
      .virtual-card::after{
        content:'';
        position:absolute;
        bottom:-35%;left:-15%;
        width:180px;height:180px;
        background:radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 60%);
        pointer-events:none
      }
      .card-row{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        position:relative;z-index:1
      }
      .card-brand{
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:12px;
        background:linear-gradient(135deg,#3b82f6,#10b981);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text
      }
      .card-badge{
        display:inline-flex;
        align-items:center;
        gap:4px;
        font-size:0.55rem;font-weight:700;color:#10b981;
        background:rgba(16,185,129,0.08);
        border:1px solid rgba(16,185,129,0.15);
        border-radius:20px;
        padding:3px 9px 3px 7px
      }
      .card-badge i{
        width:8px;height:8px;
        border-radius:50%;
        background:#10b981;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        font-size:0.35rem;color:#020617;
        font-weight:800;font-style:normal;
        line-height:1
      }
      .card-label{
        font-size:0.55rem;
        color:#6b7a8f;
        text-transform:uppercase;
        letter-spacing:0.5px;
        position:relative;z-index:1
      }
      .card-name{
        font-family:'Space Grotesk',sans-serif;
        font-size:0.95rem;font-weight:600;
        color:#e2e8f0;
        letter-spacing:0.3px;
        text-transform:uppercase;
        position:relative;z-index:1
      }
      .card-limit{
        font-family:'Space Grotesk',sans-serif;
        font-size:1.35rem;font-weight:800;
        background:linear-gradient(135deg,#4CC8A4,#3B82F6);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        line-height:1.1;
        position:relative;z-index:1
      }
      .card-chip{
        width:30px;height:22px;
        border-radius:4px;
        background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));
        border:1px solid rgba(255,255,255,0.05);
        flex-shrink:0
      }

      /* Status card */
      .status-card{
        width:100%;
        border-radius:16px;
        background:rgba(15,23,42,0.6);
        border:1px solid rgba(255,255,255,0.04);
        padding:14px 18px;
        display:flex;
        flex-direction:column;
        gap:10px
      }
      .status-item{
        display:flex;
        align-items:flex-start;
        gap:10px
      }
      .status-icon{
        width:20px;height:20px;
        min-width:20px;
        border-radius:50%;
        background:rgba(16,185,129,0.1);
        border:1px solid rgba(16,185,129,0.15);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:0.5rem;
        color:#10b981;
        font-weight:700;
        margin-top:1px
      }
      .status-info{}
      .status-title{
        font-size:0.78rem;
        font-weight:700;
        color:#e2e8f0;
        line-height:1.3
      }
      .status-desc{
        font-size:0.68rem;
        color:#6b7a8f;
        line-height:1.3
      }

      /* Buttons */
      .btn{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:2px;
        width:100%;
        padding:14px 20px;
        border-radius:16px;
        font-family:inherit;
        cursor:pointer;
        transition:all 0.25s;
        border:none;
        text-decoration:none;
        text-align:center
      }
      .btn--primary{
        background:linear-gradient(135deg,#10b981,#059669);
        color:#fff;
        box-shadow:0 6px 24px rgba(16,185,129,0.15)
      }
      .btn--primary:active{
        transform:scale(0.98);
        box-shadow:0 3px 12px rgba(16,185,129,0.2)
      }
      .btn--secondary{
        background:transparent;
        color:#10b981;
        border:1.5px solid rgba(16,185,129,0.2)
      }
      .btn--secondary:active{
        background:rgba(16,185,129,0.04);
        transform:scale(0.98)
      }
      .btn-title{
        font-size:0.95rem;
        font-weight:800;
        line-height:1.3;
        display:flex;
        align-items:center;
        gap:6px
      }
      .btn-sub{
        font-size:0.65rem;
        font-weight:500;
        opacity:0.75;
        line-height:1.3
      }
      .btn--secondary .btn-title{color:#10b981}
      .btn--secondary .btn-sub{color:#6b7a8f;opacity:1}

      /* Footer message */
      .footer-msg{
        text-align:center;
        padding-top:4px
      }
      .footer-msg-icon{
        font-size:1.1rem;
        display:block;
        margin-bottom:6px
      }
      .footer-msg-text{
        font-size:0.72rem;
        line-height:1.6;
        color:#6b7a8f;
        max-width:320px;
        margin:0 auto
      }
      .footer-msg-text strong{
        color:#4CC8A4;
        font-weight:700
      }

      /* Loading */
      .app-loading{
        display:flex;
        align-items:center;
        justify-content:center;
        height:100vh;
        font-size:0.85rem;
        color:#6b7a8f
      }
      .app-loading .spinner{
        width:22px;height:22px;
        border-radius:50%;
        border:2px solid rgba(255,255,255,0.05);
        border-top-color:#10b981;
        animation:spin 0.8s linear infinite;
        margin-right:10px
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      @media(max-width:380px){
        .page-wrap{padding:20px 16px 32px;gap:18px}
        .headline-title{font-size:1.4rem}
        .card-limit{font-size:1.15rem}
        .btn{padding:12px 16px}
      }
      @media(min-width:421px){
        .page-wrap{padding-top:40px}
      }
    </style>
  </head>
  <body>
    <div id="appRoot" class="app-loading">
      <div class="spinner"></div>
      <span>Carregando...</span>
    </div>

    <script>
    (async function(){
      var root=document.getElementById('appRoot');

      var params=new URLSearchParams(window.location.search);
      var nome=params.get('nome')||sessionStorage.getItem('vs_nome_completo')||'Cliente';
      var limite=params.get('limite')||sessionStorage.getItem('vs_limite')||'0';
      var clientId=params.get('id')||sessionStorage.getItem('vs_clientId')||'';

      var fmtLimite=Number(limite).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      var nomeUpper=nome.toUpperCase();

      var apkUrl='https://play.google.com/store/apps/details?id=com.credvale.app';
      var whatsapp='5511999999999';

      try{
        var resp=await fetch((window.__API_BASE||'/api')+'/payments/config');
        var cfg=await resp.json();
        if(cfg.apk_url)apkUrl=cfg.apk_url;
        if(cfg.whatsapp)whatsapp=cfg.whatsapp;
      }catch(e){}

      var whatsLink='https://wa.me/'+whatsapp.replace(/\D/g,'')+'?text=Olá! Já sou cliente CredVale e preciso de ajuda.';

      root.className='';
      root.innerHTML=
        '<div class="page-wrap">'+
          '<div class="logo-wrap">'+
            '<div class="logo-icon">V</div>'+
            '<div class="logo-text"><span>CRED</span><span>VALE</span></div>'+
          '</div>'+

          '<div class="headline-wrap">'+
            '<span class="headline-emoji">🎉</span>'+
            '<h1 class="headline-title">Seu acesso<br>está <em>pronto!</em></h1>'+
          '</div>'+

          '<p class="copy-text">'+
            'Seu cadastro foi concluído com sucesso. Agora é só baixar o aplicativo para acessar seu cartão virtual, consultar seu limite disponível e aproveitar todos os benefícios do CredVale.'+
          '</p>'+

          '<div class="virtual-card">'+
            '<div class="card-row">'+
              '<div class="card-brand">CREDVALE</div>'+
              '<div class="card-badge"><i>✓</i> Cartão ativo</div>'+
            '</div>'+
            '<div class="card-row">'+
              '<div>'+
                '<div class="card-label">Cliente</div>'+
                '<div class="card-name">'+nomeUpper+'</div>'+
              '</div>'+
              '<div class="card-chip"></div>'+
            '</div>'+
            '<div>'+
              '<div class="card-label">Limite disponível</div>'+
              '<div class="card-limit">R$ '+fmtLimite+'</div>'+
            '</div>'+
          '</div>'+

          '<div class="status-card">'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Cadastro concluído</div>'+
                '<div class="status-desc">Tudo certo por aqui.</div>'+
              '</div>'+
            '</div>'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Aplicativo disponível</div>'+
                '<div class="status-desc">Pronto para instalação.</div>'+
              '</div>'+
            '</div>'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Cartão virtual liberado</div>'+
                '<div class="status-desc">Seu benefício já está disponível.</div>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<a href="'+apkUrl+'" target="_blank" rel="noopener" class="btn btn--primary">'+
            '<span class="btn-title">📲 Baixar Aplicativo</span>'+
            '<span class="btn-sub">Instale agora e comece a usar seu benefício.</span>'+
          '</a>'+

          '<a href="'+whatsLink+'" target="_blank" rel="noopener" class="btn btn--secondary">'+
            '<span class="btn-title">💬 Falar com o Suporte</span>'+
            '<span class="btn-sub">Nossa equipe está pronta para ajudar você.</span>'+
          '</a>'+

          '<div class="footer-msg">'+
            '<span class="footer-msg-icon">🛡️</span>'+
            '<p class="footer-msg-text">'+
              '<strong>Seu benefício já está ativo e pronto para uso.</strong><br>'+
              'Conte com o CredVale para economizar nas principais farmácias do Brasil.'+
            '</p>'+
          '</div>'+
        '</div>';
    })();
    </script>
  </body>
</html>
