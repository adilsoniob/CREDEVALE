<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b1319" />
    <title>CredVale — Seu Acesso Está Pronto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function(){var h=window.location.hostname;var p=window.location.port;var rail='https://valle-production-105b.up.railway.app/api';if(h.includes('edgeone.run')){window.__API_BASE=sessionStorage.getItem('vs_api_url')||rail}else if(h==='localhost'||h==='127.0.0.1'){if(p==='3000'||!p){window.__API_BASE=window.location.origin+'/api'}else{window.__API_BASE=rail;try{sessionStorage.setItem('vs_api_url',rail)}catch(e){}}}else{window.__API_BASE='/api'}})();
    </script>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%}
      body{
        font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
        background:#0b1319;
        color:#e2e8f0;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        overflow-x:hidden
      }
      .page-wrap{
        max-width:420px;
        padding:56px 20px 24px;
        margin:0 auto;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        gap:14px
      }

      /* Logo */
      .logo-wrap{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px
      }
      .logo-icon{
        width:34px;height:34px;
        border-radius:9px;
        background:linear-gradient(135deg,#3b82f6,#10b981);
        display:flex;align-items:center;justify-content:center;
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:15px;color:#fff;
        box-shadow:0 4px 16px rgba(59,130,246,0.12)
      }
      .logo-text{
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:18px;line-height:1
      }
      .logo-text span:first-child{color:#fff}
      .logo-text span:last-child{color:#10b981}

      /* Headline */
      .headline-wrap{text-align:center}
      .headline-emoji{font-size:1.6rem;display:block;margin-bottom:2px}
      .headline-title{
        font-family:'Space Grotesk',sans-serif;
        font-size:1.3rem;font-weight:800;line-height:1.2;
        color:#e2e8f0
      }
      .headline-title em{
        font-style:normal;
        background:linear-gradient(135deg,#10b981,#34d399);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text
      }

      /* Copy */
      .copy-text{
        font-size:0.75rem;line-height:1.55;
        color:#94a3b8;text-align:center;
        max-width:340px;margin:0 auto
      }

      /* Card virtual */
      .virtual-card{
        width:300px;
        margin:0 auto;
        aspect-ratio:1.586;
        border-radius:14px;
        background:linear-gradient(145deg,rgba(30,41,59,0.85),rgba(15,23,42,0.9));
        border:1px solid rgba(255,255,255,0.06);
        box-shadow:0 12px 40px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.03) inset;
        padding:16px 18px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        position:relative;
        overflow:hidden;
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px)
      }
      .virtual-card::before{
        content:'';
        position:absolute;
        top:-50%;right:-25%;
        width:220px;height:220px;
        background:radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 60%);
        pointer-events:none
      }
      .virtual-card::after{
        content:'';
        position:absolute;
        bottom:-35%;left:-15%;
        width:160px;height:160px;
        background:radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 60%);
        pointer-events:none
      }
      .card-row{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        position:relative;z-index:1
      }
      .card-brand{
        font-family:'Space Grotesk',sans-serif;
        font-weight:800;font-size:11px;
        background:linear-gradient(135deg,#3b82f6,#10b981);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text
      }
      .card-badge{
        display:inline-flex;
        align-items:center;
        gap:3px;
        font-size:0.5rem;font-weight:700;color:#10b981;
        background:rgba(16,185,129,0.08);
        border:1px solid rgba(16,185,129,0.15);
        border-radius:20px;
        padding:2px 7px 2px 5px
      }
      .card-badge i{
        width:7px;height:7px;
        border-radius:50%;
        background:#10b981;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        font-size:0.3rem;color:#020617;
        font-weight:800;font-style:normal;
        line-height:1
      }
      .card-label{
        font-size:0.5rem;
        color:#6b7a8f;
        text-transform:uppercase;
        letter-spacing:0.5px;
        position:relative;z-index:1
      }
      .card-name{
        font-family:'Space Grotesk',sans-serif;
        font-size:0.85rem;font-weight:600;
        color:#e2e8f0;
        letter-spacing:0.3px;
        text-transform:uppercase;
        position:relative;z-index:1
      }
      .card-limit{
        font-family:'Space Grotesk',sans-serif;
        font-size:1.15rem;font-weight:800;
        background:linear-gradient(135deg,#4CC8A4,#3B82F6);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        line-height:1.1;
        position:relative;z-index:1
      }
      .card-chip{
        width:26px;height:18px;
        border-radius:3px;
        background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));
        border:1px solid rgba(255,255,255,0.05);
        flex-shrink:0
      }

      /* Status card */
      .status-card{
        width:100%;
        border-radius:14px;
        background:rgba(15,23,42,0.6);
        border:1px solid rgba(255,255,255,0.04);
        padding:12px 16px;
        display:flex;
        flex-direction:column;
        gap:8px
      }
      .status-item{
        display:flex;
        align-items:flex-start;
        gap:8px
      }
      .status-icon{
        width:18px;height:18px;
        min-width:18px;
        border-radius:50%;
        background:rgba(16,185,129,0.1);
        border:1px solid rgba(16,185,129,0.15);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:0.45rem;
        color:#10b981;
        font-weight:700;
        margin-top:1px
      }
      .status-title{
        font-size:0.72rem;
        font-weight:700;
        color:#e2e8f0;
        line-height:1.3
      }
      .status-desc{
        font-size:0.62rem;
        color:#6b7a8f;
        line-height:1.3
      }

      /* Buttons */
      .btn{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:1px;
        width:100%;
        padding:12px 18px;
        border-radius:14px;
        font-family:inherit;
        cursor:pointer;
        transition:all 0.25s;
        border:none;
        text-decoration:none;
        text-align:center
      }
      .btn--primary{
        background:linear-gradient(135deg,#10b981,#059669);
        color:#fff;
        box-shadow:0 6px 24px rgba(16,185,129,0.15)
      }
      .btn--primary:active{
        transform:scale(0.98);
        box-shadow:0 3px 12px rgba(16,185,129,0.2)
      }
      .btn--secondary{
        background:transparent;
        color:#10b981;
        border:1.5px solid rgba(16,185,129,0.2)
      }
      .btn--secondary:active{
        background:rgba(16,185,129,0.04);
        transform:scale(0.98)
      }
      .btn-title{
        font-size:0.88rem;
        font-weight:800;
        line-height:1.3;
        display:flex;
        align-items:center;
        gap:5px
      }
      .btn-sub{
        font-size:0.6rem;
        font-weight:500;
        opacity:0.75;
        line-height:1.3
      }
      .btn--secondary .btn-title{color:#10b981}
      .btn--secondary .btn-sub{color:#6b7a8f;opacity:1}

      /* Footer message */
      .footer-msg{
        text-align:center
      }
      .footer-msg-icon{
        font-size:0.95rem;
        display:block;
        margin-bottom:4px
      }
      .footer-msg-text{
        font-size:0.65rem;
        line-height:1.5;
        color:#6b7a8f;
        max-width:300px;
        margin:0 auto
      }
      .footer-msg-text strong{
        color:#4CC8A4;
        font-weight:700
      }

      /* Loading */
      .app-loading{
        display:flex;
        align-items:center;
        justify-content:center;
        height:100vh;
        font-size:0.85rem;
        color:#6b7a8f
      }
      .app-loading .spinner{
        width:22px;height:22px;
        border-radius:50%;
        border:2px solid rgba(255,255,255,0.05);
        border-top-color:#10b981;
        animation:spin 0.8s linear infinite;
        margin-right:10px
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      /* Download modal */
      .dl-overlay{
        position:fixed;inset:0;z-index:9999;
        background:rgba(2,6,23,0.8);
        backdrop-filter:blur(8px);
        -webkit-backdrop-filter:blur(8px);
        display:flex;align-items:center;justify-content:center;
        padding:24px;
        animation:dlIn 0.3s ease
      }
      @keyframes dlIn{from{opacity:0}to{opacity:1}}
      .dl-box{
        background:linear-gradient(160deg,rgba(30,41,59,0.95),rgba(15,23,42,0.98));
        border:1px solid rgba(255,255,255,0.06);
        border-radius:20px;
        padding:32px 24px 24px;
        max-width:340px;width:100%;
        text-align:center;
        box-shadow:0 30px 80px rgba(0,0,0,0.5);
        animation:dlBoxIn 0.3s ease
      }
      @keyframes dlBoxIn{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
      .dl-box-icon{font-size:2.8rem;display:block;margin-bottom:8px}
      .dl-box-title{font-size:1rem;font-weight:800;color:#e2e8f0;margin-bottom:4px}
      .dl-box-desc{font-size:0.78rem;color:#94a3b8;line-height:1.5;margin-bottom:20px}
      .dl-box-btn{
        display:inline-flex;align-items:center;justify-content:center;gap:6px;
        width:100%;padding:14px;border-radius:14px;
        font-family:inherit;font-size:0.9rem;font-weight:800;
        cursor:pointer;transition:all 0.25s;
        border:none;text-decoration:none
      }
      .dl-box-btn--primary{
        background:linear-gradient(135deg,#10b981,#059669);
        color:#fff;box-shadow:0 6px 24px rgba(16,185,129,0.2)
      }
      .dl-box-btn--primary:active{transform:scale(0.97)}
      .dl-box-btn--ghost{
        background:transparent;color:#94a3b8;font-size:0.85rem;font-weight:600;margin-top:4px
      }
      .dl-box-btn--ghost:active{transform:scale(0.97)}
      .dl-box-filename{font-size:0.72rem;color:#6b7a8f;margin-top:8px}

      @media(max-width:360px){
        .page-wrap{padding:14px 14px 20px;gap:12px}
        .virtual-card{width:260px;padding:14px 14px}
        .headline-title{font-size:1.1rem}
        .card-limit{font-size:1rem}
        .btn{padding:10px 14px}
      }
      @media(min-width:421px){
        .page-wrap{padding-top:32px;gap:16px}
      }
    </style>
  </head>
  <body>
    <header style="position:fixed;top:0;left:0;right:0;z-index:100;padding:6px 8px;background:rgba(11,19,25,0.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-radius:0 0 16px 16px;">
      <div style="display:flex;width:100%;gap:4px;align-items:center;justify-content:space-between;">
        <a href="/" style="display:flex;align-items:center;gap:6px;text-decoration:none;">
          <span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#10b981);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;">V</span>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:15px;display:flex;gap:0;"><span style="color:#fff;">CRED</span><span style="color:#10b981;">VALE</span></span>
        </a>
        <a href="/" style="font-size:0.7rem;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;white-space:nowrap;background:rgba(16,185,129,0.1);border-radius:8px;border:1px solid rgba(16,185,129,0.2);padding:4px 10px;">Voltar ao início</a>
      </div>
    </header>
    <div id="appRoot" class="app-loading">
      <div class="spinner"></div>
      <span>Carregando...</span>
    </div>

    <script>
    (async function(){
      var root=document.getElementById('appRoot');

      var params=new URLSearchParams(window.location.search);
      var nome=params.get('nome')||sessionStorage.getItem('vs_nome_completo')||'Cliente';
      var limite=params.get('limite')||sessionStorage.getItem('vs_limite')||'0';
      var clientId=params.get('id')||sessionStorage.getItem('vs_clientId')||'';

      var fmtLimite=Number(limite).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      var nomeUpper=nome.toUpperCase();

      var apkUrl='';
      var whatsapp='5511999999999';

      try{
        var [appResp, cfgResp]=await Promise.all([
          fetch((window.__API_BASE||'/api')+'/app/active'),
          fetch((window.__API_BASE||'/api')+'/payments/config')
        ]);
        var appCfg=await appResp.json();
        var cfg=await cfgResp.json();

        if(appCfg.active){
          if(appCfg.external_link) apkUrl=appCfg.external_link;
          else if(appCfg.file_name) apkUrl=(window.__API_BASE||'/api').replace('/api','')+'/uploads/'+appCfg.file_name;
        }
        if(!apkUrl) apkUrl='https://play.google.com/store/apps/details?id=com.credvale.app';
        if(cfg.whatsapp)whatsapp=cfg.whatsapp;
        var whatsLink='https://wa.me/'+whatsapp.replace(/\D/g,'')+'?text=Olá! Já sou cliente CredVale e preciso de ajuda.';
      }catch(e){
        apkUrl='https://play.google.com/store/apps/details?id=com.credvale.app';
      }

      var isExternalLink=apkUrl.includes('play.google.com')||apkUrl.includes('apps.apple.com');

      function showDownloadModal(){
        var ov=document.createElement('div');
        ov.className='dl-overlay';
        ov.innerHTML=
          '<div class="dl-box" id="dlBox">'+
            '<span class="dl-box-icon" id="dlIcon">📲</span>'+
            '<div class="dl-box-title" id="dlTitle">'+(isExternalLink?'Ir para loja':'Baixar aplicativo')+'</div>'+
            '<div class="dl-box-desc" id="dlDesc">'+(isExternalLink?
              'Clique abaixo para acessar a loja oficial do CredVale.':
              'Clique em <strong>Baixar</strong> para salvar o arquivo <strong>CredVale.apk</strong> no seu celular.' )+'</div>'+
            (!isExternalLink?'<div class="dl-box-filename" id="dlFile">📄 CredVale.apk</div>':'')+
            '<div id="dlProgressArea" style="display:none;margin-bottom:16px;">'+
              '<div style="height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">'+
                '<div id="dlProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:3px;transition:width 0.3s;"></div>'+
              '</div>'+
              '<div id="dlProgressText" style="font-size:0.68rem;color:var(--color-text-muted);margin-top:4px;">Preparando...</div>'+
            '</div>'+
            '<button class="dl-box-btn dl-box-btn--primary" id="dlConfirmBtn">'+
              (isExternalLink?'Acessar Loja':'Baixar CredVale.apk')+
            '</button>'+
            '<button class="dl-box-btn dl-box-btn--ghost" id="dlCancelBtn">Agora não</button>'+
          '</div>';
        document.body.appendChild(ov);

        document.getElementById('dlConfirmBtn').onclick=function(){
          try { var _sid=sessionStorage.getItem('vs_session_id'); if(_sid)navigator.sendBeacon((window.__API_BASE||'/api')+'/track/session/stage',new Blob([JSON.stringify({session_id:_sid,stage:'Baixando Aplicativo'})],{type:'application/json'})); }catch(e){}
          if(isExternalLink){
            window.location.href=apkUrl;
          }else{
            document.getElementById('dlTitle').textContent='Baixando...';
            document.getElementById('dlDesc').innerHTML='Aguarde enquanto preparamos o arquivo.';
            document.getElementById('dlProgressArea').style.display='';
            document.getElementById('dlConfirmBtn').textContent='Aguarde...';
            document.getElementById('dlConfirmBtn').disabled=true;
            document.getElementById('dlCancelBtn').style.display='none';
            document.getElementById('dlIcon').textContent='⏳';
            var xhr=new XMLHttpRequest();
            xhr.open('GET',apkUrl,true);
            xhr.responseType='blob';
            xhr.onprogress=function(e){
              if(e.lengthComputable){
                var pct=Math.round((e.loaded/e.total)*100);
                document.getElementById('dlProgressBar').style.width=pct+'%';
                document.getElementById('dlProgressText').textContent='Baixando '+pct+'% ('+(e.loaded/1048576).toFixed(1)+' MB)';
              }else{
                document.getElementById('dlProgressText').textContent='Baixando... ('+(e.loaded/1048576).toFixed(1)+' MB)';
              }
            };
            xhr.onload=function(){
              if(xhr.status===200){
                document.getElementById('dlTitle').textContent='Download concluido!';
                document.getElementById('dlProgressText').textContent='Salvando arquivo...';
                document.getElementById('dlIcon').textContent='✅';
                var blob=new Blob([xhr.response],{type:'application/vnd.android.package-archive'});
                var url=URL.createObjectURL(blob);
                var a=document.createElement('a');
                a.href=url;
                a.download='CredVale.apk';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function(){URL.revokeObjectURL(url)},10000);
                document.getElementById('dlProgressArea').style.display='none';
                document.getElementById('dlConfirmBtn').textContent='Download concluido!';
                document.getElementById('dlConfirmBtn').disabled=false;
                document.getElementById('dlConfirmBtn').onclick=function(){ov.remove()};
                document.getElementById('dlCancelBtn').style.display='';
                document.getElementById('dlCancelBtn').textContent='Fechar';
              }else{
                window.location.href=apkUrl;
              }
            };
            xhr.onerror=function(){
              var apiBase=(window.__API_BASE||'/api').replace('/api','');
              var directUrl=apkUrl;
              document.getElementById('dlTitle').textContent='Clique para baixar';
              document.getElementById('dlDesc').innerHTML='Clique no botao abaixo para baixar o aplicativo.';
              document.getElementById('dlProgressArea').style.display='none';
              document.getElementById('dlIcon').textContent='📲';
              document.getElementById('dlConfirmBtn').textContent='Baixar CredVale.apk';
              document.getElementById('dlConfirmBtn').disabled=false;
              document.getElementById('dlConfirmBtn').onclick=function(){window.location.href=directUrl};
              document.getElementById('dlCancelBtn').style.display='';
            };
            xhr.send();
          }
        };
        document.getElementById('dlCancelBtn').onclick=function(){ov.remove()};
        ov.onclick=function(e){if(e.target===ov)ov.remove()};
      }

      root.className='';
      root.innerHTML=
        '<div class="page-wrap">'+

          '<div class="headline-wrap">'+
            '<span class="headline-emoji">🎉</span>'+
            '<h1 class="headline-title">Seu acesso está <em>pronto!</em></h1>'+
          '</div>'+

          '<p class="copy-text">'+
            'Seu cadastro foi concluído com sucesso. Agora é só baixar o aplicativo para acessar seu cartão virtual, consultar seu limite disponível e aproveitar todos os benefícios do CredVale.'+
          '</p>'+

          '<div class="virtual-card">'+
            '<div class="card-row">'+
              '<div class="card-brand">CREDVALE</div>'+
              '<div class="card-badge"><i>✓</i> Cartão ativo</div>'+
            '</div>'+
            '<div class="card-row">'+
              '<div>'+
                '<div class="card-label">Cliente</div>'+
                '<div class="card-name">'+nomeUpper+'</div>'+
              '</div>'+
              '<div class="card-chip"></div>'+
            '</div>'+
            '<div>'+
              '<div class="card-label">Limite disponível</div>'+
              '<div class="card-limit">R$ '+fmtLimite+'</div>'+
            '</div>'+
          '</div>'+

          '<div class="status-card">'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Cadastro concluído</div>'+
                '<div class="status-desc">Tudo certo por aqui.</div>'+
              '</div>'+
            '</div>'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Aplicativo disponível</div>'+
                '<div class="status-desc">Pronto para instalação.</div>'+
              '</div>'+
            '</div>'+
            '<div class="status-item">'+
              '<div class="status-icon">✓</div>'+
              '<div class="status-info">'+
                '<div class="status-title">Cartão virtual liberado</div>'+
                '<div class="status-desc">Seu benefício já está disponível.</div>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<button class="btn btn--primary" id="btnBaixarApp">'+
            '<span class="btn-title">📲 Baixar Aplicativo</span>'+
            '<span class="btn-sub">Instale agora e comece a usar seu benefício.</span>'+
          '</button>'+
