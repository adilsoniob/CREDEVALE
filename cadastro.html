<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0e171f">
  <title>Cadastro - CREDVALE</title>
  <link rel="stylesheet" href="styles.css?v=3.2">
  <link rel="stylesheet" href="cadastro.css?v=3.2">
  <link rel="stylesheet" href="cadastro-chat.css?v=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22url(%23g)%22/><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%233B82F6%22/><stop offset=%22100%25%22 stop-color=%22%234CC8A4%22/></linearGradient></defs><text x=%2216%22 y=%2223%22 font-family=%22system-ui%22 font-size=%2218%22 fill=%22%23fff%22 text-anchor=%22middle%22 font-weight=%22800%22>V</text></svg>">
  <script src="frontend/js/api.js?v=3.1"></script>
  <style>
    body { background: #0e171f; }
  </style>
</head>
<body style="background:#0e171f;margin:0;">

  <!-- CHAT CONVERSACIONAL -->
  <div id="chatModal" class="chat-modal" hidden>
    <div class="chat-modal__top">
      <div class="chat-modal__brand">
        <div class="chat-modal__brand-icon" style="background:linear-gradient(135deg,#3b82f6,#10b981);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;">V</div>
        <span>CREDVALE</span>
      </div>
      <button class="chat-modal__close" id="chatClose" onclick="fecharChat()" title="Fechar">✕</button>
    </div>

    <div class="chat-progress">
      <div class="chat-progress__bar" id="chatProgressBar"></div>
    </div>
    <div class="chat-progress__steps" id="chatSteps">
      <div class="chat-progress__step" data-step="0"><div class="chat-progress__dot"></div>Início</div>
      <div class="chat-progress__step" data-step="1"><div class="chat-progress__dot"></div>CPF</div>
      <div class="chat-progress__step" data-step="2"><div class="chat-progress__dot"></div>Dados</div>
      <div class="chat-progress__step" data-step="3"><div class="chat-progress__dot"></div>Endereço</div>
      <div class="chat-progress__step" data-step="4"><div class="chat-progress__dot"></div>Contato</div>
      <div class="chat-progress__step" data-step="5"><div class="chat-progress__dot"></div>Perfil</div>
      <div class="chat-progress__step" data-step="6"><div class="chat-progress__dot"></div>Docs</div>
      <div class="chat-progress__step" data-step="7"><div class="chat-progress__dot"></div>Análise</div>
      <div class="chat-progress__step" data-step="8"><div class="chat-progress__dot"></div>Plano</div>
      <div class="chat-progress__step" data-step="9"><div class="chat-progress__dot"></div>Adesão</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area" id="chatInputArea">
      <div class="chat-input-row">
        <input type="text" class="chat-input" id="chatInput" placeholder="Digite aqui..." autocomplete="off">
        <button class="chat-send" id="chatSend">➤</button>
      </div>
    </div>
  </div>

  <script>
    // Pre-fill from sessionStorage handled by cadastro.js
  </script>
  <script src="cadastro.js?v=mqzgzcak.3"></script>
</body>
</html>
