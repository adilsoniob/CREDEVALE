    <script>
    (function(){
      var COPY_A = { main:'At\u00e9 R$ 5.000 de limite', green:'Cr\u00e9dito liberado em poucos minutos.', white:'sem consulta ao SPC e Serasa.' };
      var COPY_B = [
        { main:'O rem\u00e9dio n\u00e3o pode esperar.', green:'Seu cr\u00e9dito tamb\u00e9m n\u00e3o.' },
        { main:'Seu limite aprovado.', green:'Sua sa\u00fade em primeiro lugar.' },
        { main:'At\u00e9 45 dias', green:'para pagar sua fatura.' },
        { main:'Mais prazo para pagar.', green:'Menos preocupa\u00e7\u00e3o no fim do m\u00eas.' },
        { main:'Economia hoje.', green:'Tranquilidade para pagar depois.' }

      function injetar() {
        var h1 = document.querySelector('h1.font-display');
        if (!h1) return false;
        var container = h1.parentElement;
        if (!container) return false;
        if (container.querySelector('.hero-frame')) return true;

        var imgDiv = container.querySelector('.rounded-2xl');
        var imgHTML = imgDiv ? imgDiv.outerHTML : '';
        var subP = container.querySelector('p.text-sm.md\\:text-base');
        var subHTML = subP ? subP.outerHTML : '';

        // Left = Copy A (fixed), Right = 5 variations (cycling)
        var leftHTML = '<div class="hero-item hero-item--left active">' +
          '<div class="hero-item__main">' + COPY_A.main + '</div>' +
          '<div class="hero-item__green">' + COPY_A.green + '</div>' +
          '<div class="hero-item__white">' + COPY_A.white + '</div>' +
        '</div>';

        var rightItems = '';
        for (var i = 0; i < COPY_B.length; i++) {
          var c = COPY_B[i];
          rightItems += '<div class="hero-item' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' +
            '<div class="hero-item__main">' + c.main + '</div>' +
            '<div class="hero-item__green">' + c.green + '</div>' +
          '</div>';
        }

        var dotsHTML = '<div class="hero-dots">';
        for (var d = 0; d < COPY_B.length; d++) {
          dotsHTML += '<span class="hero-dot' + (d === 0 ? ' active' : '') + '" data-idx="' + d + '"></span>';
        }
        dotsHTML += '</div>';

        container.innerHTML =
          '<div class="hero-frame">' +
            '<div class="hero-frame__inner">' +
              '<div class="hero-grid">' +
                '<div class="hero-col hero-col--left">' + leftHTML + '</div>' +
                '<div class="hero-col hero-col--right">' + rightItems + '</div>' +
              '</div>' +
            '</div>' +
            dotsHTML +
          '</div>' +
          imgHTML +
          subHTML;

        // CSS
        if (!document.getElementById('heroCSS')) {
          var st = document.createElement('style');
          st.id = 'heroCSS';
          st.textContent =
            '.hero-frame{margin-bottom:16px}' +
            '.hero-frame__inner{background:linear-gradient(160deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px 22px;position:relative}' +
            '.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:85px}' +
            '.hero-col{position:relative}' +
            '.hero-item{position:absolute;top:0;left:0;width:100%;opacity:0;transform:translateY(10px);transition:opacity .9s ease,transform .9s ease;pointer-events:none}' +
            '.hero-item.active,.hero-item--left{opacity:1;transform:translateY(0);pointer-events:auto;position:relative}' +
            '.hero-item__main{font-family:"Space Grotesk","Plus Jakarta Sans",sans-serif;font-size:1.2rem;line-height:1.3;font-weight:900;color:#f1f5f9;letter-spacing:-.02em}' +
            '.hero-item__green{font-family:"Space Grotesk","Plus Jakarta Sans",sans-serif;font-size:1.2rem;line-height:1.3;font-weight:900;color:#34d399;letter-spacing:-.02em}' +
            '.hero-item__white{font-family:"Space Grotesk","Plus Jakarta Sans",sans-serif;font-size:1.2rem;line-height:1.3;font-weight:900;color:#f1f5f9;letter-spacing:-.02em}' +
            '.hero-col--left .hero-item__green{transition:opacity .5s ease .3s,transform .5s ease .3s}' +
            '.hero-col--right .hero-item{transition:opacity .9s ease,transform .9s ease}' +
            '.hero-col--right .hero-item.active{position:relative}' +
            '.hero-col--right .hero-item__green{transition:opacity .5s ease .3s,transform .5s ease .3s;opacity:0;transform:translateY(6px)}' +
            '.hero-col--right .hero-item.active .hero-item__green{opacity:1;transform:translateY(0)}' +
            '.hero-dots{display:flex;gap:8px;margin-top:14px}' +
            '.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(148,163,184,.3);transition:all .5s ease;cursor:pointer}' +
            '.hero-dot.active{background:#34d399;width:28px;border-radius:4px}' +
            '@media(max-width:767px){' +
              '.hero-frame__inner{padding:16px 14px}' +
              '.hero-grid{min-height:65px;gap:10px}' +
              '.hero-item__main,.hero-item__green{font-size:.95rem}' +
            '}';
          document.head.appendChild(st);
        }

        // Right column only: cycle through 5 variations every 6s
        var rightIdx = 0;
        var timer;
        var itemsRight = container.querySelectorAll('.hero-col--right .hero-item');
        var dots = container.querySelectorAll('.hero-dot');
        var busy = false;

        function setRight(idx) {
          if (busy || idx === rightIdx) return;
          busy = true;
          itemsRight[rightIdx].classList.remove('active');
          rightIdx = idx;
          itemsRight[rightIdx].classList.add('active');
          dots.forEach(function(el){ el.classList.remove('active'); });
          dots[idx].classList.add('active');
          setTimeout(function(){ busy = false; }, 900);
        }

        function next() { setRight((rightIdx + 1) % COPY_B.length); }
        function startTimer() { clearInterval(timer); timer = setInterval(next, 6000); }

        for (var di = 0; di < dots.length; di++) {
          (function(idx){
            dots[idx].addEventListener('click', function(){
              setRight(idx);
              startTimer();
            });
          })(di);
        }

        startTimer();
        return true;
      }

      if (!injetar()) {
        var obs = new MutationObserver(function(){ if (injetar()) obs.disconnect(); });
        obs.observe(document.body, {childList:true, subtree:true});
        setTimeout(function(){ obs.disconnect(); }, 15000);
      }
    })();

        var duration = (parseInt(s.popup_duration) || 10) * 1000;

        var overlay = document.createElement('div');
        overlay.className = 'ntf-overlay';
        overlay.innerHTML =
          '<div class="ntf-box" style="font-family:' + font + '">' +

            (ctaText ? '<a class="ntf-cta" href="' + (ctaLink || '#') + '" target="_blank" rel="noopener">' + escHtml(ctaText) + '</a>' : '') +

        document.head.appendChild(css);

        var timer = setTimeout(function(){
          document.body.appendChild(overlay);
          sessionStorage.setItem('vs_popup_viewed', '1');
          var closeTimer = setTimeout(function(){ overlay.remove(); }, duration);
          overlay.querySelector('.ntf-close').onclick = function(){ overlay.remove(); clearTimeout(closeTimer); };
          overlay.onclick = function(e){ if (e.target === overlay) { overlay.remove(); clearTimeout(closeTimer); } };
        }, 700);
      }).catch(function(){});
    })();
