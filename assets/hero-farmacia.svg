<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Pessoa idosa sorrindo na farmácia">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#E8F9F0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <!-- Farmácia simples -->
  <g transform="translate(120,120)">
    <rect x="0" y="120" width="260" height="260" rx="8" fill="#FFFFFF" stroke="#CFD8DC" stroke-width="2"/>
    <rect x="20" y="140" width="220" height="40" rx="4" fill="#2A7BD9"/>
    <text x="130" y="168" text-anchor="middle" fill="#FFFFFF" font-family="system-ui" font-weight="600" font-size="18">Farmácia</text>
    <!-- prateleiras -->
    <g fill="#B0BEC5">
      <rect x="30" y="200" width="200" height="12" rx="2"/>
      <rect x="30" y="230" width="200" height="12" rx="2"/>
      <rect x="30" y="260" width="200" height="12" rx="2"/>
      <rect x="30" y="290" width="200" height="12" rx="2"/>
    </g>
  </g>
  <!-- Pessoa idosa -->
  <g transform="translate(460,150)">
    <!-- corpo -->
    <ellipse cx="0" cy="260" rx="70" ry="120" fill="#F5F5F5" stroke="#CFD8DC" stroke-width="2"/>
    <!-- cabeça -->
    <circle cx="0" cy="80" r="55" fill="#F5F5F5" stroke="#CFD8DC" stroke-width="2"/>
    <!-- cabelo -->
    <path d="M-55,50 Q0,20 55,50 Q55,80 -55,80" fill="#78909C"/>
    <!-- rosto detalhes -->
    <ellipse cx="-18" cy="70" rx="6" ry="8" fill="#546E7A"/> <!-- olho esq -->
    <ellipse cx="18" cy="70" rx="6" ry="8" fill="#546E7A"/> <!-- olho dir -->
    <path d="M-10,100 Q0,110 10,100" stroke="#546E7A" stroke-width="3" fill="none" stroke-linecap="round"/> <!-- sorriso -->
    <!-- óculos -->
    <g stroke="#37474F" stroke-width="2" fill="none">
      <circle cx="-18" cy="70" r="14"/>
      <circle cx="18" cy="70" r="14"/>
      <line x1="0" y1="70" x2="0" y2="70" stroke-width="2"/>
    </g>
    <!-- mãos segurando cartão -->
    <g transform="translate(-70,200)">
      <path d="M0,0 L30,-20 L60,0 L30,20 Z" fill="#2A7BD9" opacity="0.9"/>
      <text x="30" y="6" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">Vale</text>
      <text x="30" y="18" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">Saúde</text>
    </g>
  </g>
</svg>
