      function inject(){
        var cards = document.querySelectorAll('#planos [class*="rounded-3xl"][class*="flex-col"]');
        if(cards.length<2)return false;
        for(var i=0;i<cards.length;i++){
          var c=cards[i];
          if(c.querySelector('.plano-features'))continue;
          var img=c.querySelector('.overflow-hidden.border');
          if(img){img.style.display='none'}
          var price=c.querySelector('[class*="items-baseline"]');
          if(!price)continue;
          var feat=i===1?plus:std;
          var ul=document.createElement('ul');
          ul.className='plano-features';
          for(var j=0;j<feat.length;j++){
            var li=document.createElement('li');
            li.innerHTML='<span>\u2713</span> '+feat[j];
            ul.appendChild(li);
          }
          price.parentNode.insertBefore(ul,price);
        }
        return true;
      }
      var t=setInterval(function(){if(inject())clearInterval(t)},300);
      setTimeout(function(){clearInterval(t)},15000);
    })();
