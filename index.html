  <body class="bg-slate-950 text-slate-100 antialiased selection:bg-emerald-500 selection:text-slate-950 overflow-x-hidden">
    <div id="root"></div>
    <script>
    (function(){
      var std = ['Cart\u00e3o Virtual','At\u00e9 55% OFF em medicamentos','Limite de cr\u00e9dito para farm\u00e1cias','Fatura em at\u00e9 30 dias','Anuidade Zero','App CREDVALE'];
      var plus = ['Cart\u00e3o F\u00edsico + Virtual','At\u00e9 75% OFF em medicamentos','Limite de at\u00e9 R$ 1.500','Fatura em at\u00e9 45 dias','2% de Cashback em farm\u00e1cias','1 Teleconsulta gr\u00e1tis por m\u00eas','Suporte VIP 24/7'];
      function inject(){
        var cards = document.querySelectorAll('#planos [class*="rounded-3xl"][class*="flex-col"]');
        if(cards.length<2)return false;
        for(var i=0;i<cards.length;i++){
          var c=cards[i];
          if(c.querySelector('.plano-features'))continue;
          var img=c.querySelector('.overflow-hidden.border');
          if(img){img.style.display='none'}
          var price=c.querySelector('[class*="items-baseline"]');
          if(!price)continue;
          var feat=i===1?plus:std;
          var ul=document.createElement('ul');
          ul.className='plano-features';
          for(var j=0;j<feat.length;j++){
            var li=document.createElement('li');
            li.innerHTML='<span>\u2713</span> '+feat[j];
            ul.appendChild(li);
          }
          price.parentNode.insertBefore(ul,price);
        }
        return true;
      }
      var t=setInterval(function(){if(inject())clearInterval(t)},300);
      setTimeout(function(){clearInterval(t)},15000);
    })();
    </script>
