<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CredVale | Cartão de Benefícios</title>
    <script>
      (function(){var h=window.location.hostname;var p=window.location.port;var rail='https://credevale-production.up.railway.app/api';if(h.includes('edgeone.run')){window.__API_BASE=rail}else if(h==='localhost'||h==='127.0.0.1'){if(p==='3000'||!p){window.__API_BASE=window.location.origin+'/api'}else{window.__API_BASE=rail;try{sessionStorage.setItem('vs_api_url',rail)}catch(e){}}}else{window.__API_BASE='/api'}})();
    </script>
    <link rel="preload" href="/assets/hero222.webp" as="image" fetchpriority="high">
    <link rel="preload" href="/assets/logo-app.png" as="image">
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  <script>
    // Auto-registrar visita
    (function(){
      try {
        var base = window.__API_BASE || '/api';
        fetch(base + '/track/page-view', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ referrer: document.referrer || '' }) }).catch(function(){});
      } catch(e){}
    })();
  </script>
</body>
</html>
